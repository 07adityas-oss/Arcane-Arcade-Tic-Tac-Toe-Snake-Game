<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arcane Arcade | Tic-Tac-Toe & Snake by Aditya</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 20%, #0b1219, #0a0f16);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      transition: background 0.3s ease;
    }

    /* navigation bar - sleek glassmorphism */
    .nav-bar {
      background: rgba(12, 22, 32, 0.75);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 215, 150, 0.25);
      padding: 0.9rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .logo-area {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #F9E0A0, #D4AF6A);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .founder-tag {
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #e9dbbd;
      border-left: 2px solid #e9b35f;
    }

    .nav-links {
      display: flex;
      gap: 1.2rem;
      background: rgba(0,0,0,0.4);
      padding: 0.3rem;
      border-radius: 60px;
    }

    .nav-btn {
      background: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.5rem 1.8rem;
      border-radius: 40px;
      color: #cddde9;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      backdrop-filter: blur(2px);
    }

    .nav-btn.active {
      background: #e9b35f;
      color: #0f1a1f;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .nav-btn:not(.active):hover {
      background: rgba(233, 179, 95, 0.2);
      color: #ffeaaf;
    }

    /* main container pages */
    .pages-container {
      position: relative;
      min-height: calc(100vh - 80px);
      overflow: hidden;
    }

    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1), visibility 0.4s;
      padding: 2rem 1.5rem;
    }

    .page.active-page {
      opacity: 1;
      visibility: visible;
      position: relative;
    }

    /* game card styling - professional & premium */
    .game-card {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(20, 30, 40, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 3rem;
      padding: 1.8rem 2rem 2rem;
      box-shadow: 0 30px 45px -15px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid rgba(255,210,130,0.2);
    }

    .game-header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .game-title {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(145deg, #FFF2DF, #E2C28B);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Tic Tac Toe specific styles (refined) */
    .info-panel {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 100px;
      padding: 0.6rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .score-box {
      display: flex;
      gap: 1.5rem;
      background: #0b141a;
      padding: 0.3rem 1.2rem;
      border-radius: 3rem;
    }

    .score {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-weight: 600;
      color: #ddeeff;
    }
    .score .value {
      font-size: 1.7rem;
      font-weight: 800;
      color: #F2D184;
    }
    .turn-indicator {
      background: #1e2f38;
      padding: 0.4rem 1.2rem;
      border-radius: 3rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .player-badge {
      background: #00000050;
      padding: 4px 14px;
      border-radius: 2rem;
      font-weight: 800;
      font-size: 1.2rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      background: rgba(0, 0, 0, 0.35);
      padding: 14px;
      border-radius: 2rem;
      margin-bottom: 1.8rem;
    }

    .cell {
      aspect-ratio: 1;
      background: linear-gradient(145deg, #fdf7ed, #f2e3ca);
      border-radius: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.4rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15);
      color: #2c3e2f;
    }
    .cell.X { color: #2c6280; text-shadow: 0 0 6px #b7e1ff; }
    .cell.O { color: #b45f2b; text-shadow: 0 0 6px #ffcf9a; }
    .cell.win-highlight {
      background: radial-gradient(circle at 30% 35%, #ffefbf, #f7d893);
      box-shadow: 0 0 0 3px #ffcf6e;
    }
    .btn {
      background: #2c3f48;
      border: none;
      font-family: inherit;
      font-weight: 600;
      padding: 0.7rem 1.6rem;
      border-radius: 3rem;
      color: #f2ede4;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 3px 6px rgba(0,0,0,0.3);
    }
    .btn-primary { background: #3f5e6b; }
    .btn-primary:active { transform: translateY(2px); }
    .btn-secondary { background: #5c4332; }
    .status-message {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
      background: #00000066;
      padding: 8px;
      border-radius: 40px;
    }

    /* SNAKE PAGE STYLES - elegant */
    .snake-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .canvas-wrapper {
      background: #071016;
      border-radius: 2rem;
      padding: 12px;
      box-shadow: inset 0 0 0 1px #4d6e7e, 0 15px 25px rgba(0,0,0,0.4);
      margin-bottom: 1.2rem;
    }
    canvas {
      display: block;
      border-radius: 1rem;
      background-color: #16262e;
      cursor: pointer;
      width: 100%;
      height: auto;
    }
    .snake-stats {
      display: flex;
      justify-content: space-between;
      width: 100%;
      gap: 1rem;
      background: #0f1a1fd9;
      padding: 0.5rem 1.5rem;
      border-radius: 3rem;
      margin-bottom: 1rem;
    }
    .snake-score, .snake-high {
      font-weight: 700;
      background: #00000040;
      padding: 5px 18px;
      border-radius: 2rem;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.2rem;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #9aaebf;
    }
    @media (max-width: 550px) {
      .game-card { padding: 1.2rem; }
      .cell { font-size: 2.2rem; }
      .nav-btn { padding: 0.4rem 1rem; }
    }
  </style>
</head>
<body>

<div class="nav-bar">
  <div class="logo-area">
    <div class="brand">✦ ARCADE DUO ✦</div>
    <div class="founder-tag">FOUNDER: ADITYA</div>
  </div>
  <div class="nav-links">
    <button class="nav-btn active" data-page="tic">❌ TIC-TAC-TOE</button>
    <button class="nav-btn" data-page="snake">🐍 SNAKE & APPLE</button>
  </div>
</div>

<div class="pages-container">
  <!-- PAGE 1: Tic Tac Toe -->
  <div id="ticPage" class="page active-page">
    <div class="game-card">
      <div class="game-header">
        <div class="game-title">❌ TIC–TAC–TOE ⭕</div>
      </div>
      <div class="info-panel">
        <div class="score-box">
          <div class="score">❌ X <span class="value" id="scoreX">0</span></div>
          <div class="score">⭕ O <span class="value" id="scoreO">0</span></div>
        </div>
        <div class="turn-indicator">
          <span class="turn-text">turn</span>
          <span class="player-badge" id="turnBadge">X</span>
        </div>
      </div>
      <div class="board" id="ticBoard"></div>
      <div class="btn-group">
        <button class="btn btn-primary" id="newTicBtn">⟳ New Round</button>
        <button class="btn btn-secondary" id="resetTicScores">♻ Reset Scores</button>
      </div>
      <div id="ticStatus" class="status-message">✨ X starts first. Make your move</div>
    </div>
    <footer>classic duel · winner takes the round</footer>
  </div>

  <!-- PAGE 2: Snake & Apple Game -->
  <div id="snakePage" class="page">
    <div class="game-card">
      <div class="game-header">
        <div class="game-title">🐍 SNAKE & APPLE 🍎</div>
      </div>
      <div class="snake-container">
        <div class="canvas-wrapper">
          <canvas id="snakeCanvas" width="400" height="400" style="width:100%; height:auto; max-width:400px; aspect-ratio:1/1"></canvas>
        </div>
        <div class="snake-stats">
          <div class="snake-score">🍎 SCORE: <span id="snakeScore">0</span></div>
          <div class="snake-high">🏆 BEST: <span id="highScore">0</span></div>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" id="restartSnakeBtn">🐍 New Game</button>
          <button class="btn" id="pauseSnakeBtn">⏸️ Pause / Resume</button>
        </div>
        <div id="snakeStatus" class="status-message">▲ ▼ ◀ ▶  |  Arrow keys to control</div>
      </div>
    </div>
    <footer>eat apples · grow longer · avoid walls & yourself</footer>
  </div>
</div>

<script>
  // ----------------------------- PAGE NAVIGATION ---------------------------------
  const pages = {
    tic: document.getElementById('ticPage'),
    snake: document.getElementById('snakePage')
  };
  const navBtns = document.querySelectorAll('.nav-btn');
  
  function switchPage(pageId) {
    Object.keys(pages).forEach(id => {
      pages[id].classList.remove('active-page');
    });
    pages[pageId].classList.add('active-page');
    navBtns.forEach(btn => {
      if(btn.getAttribute('data-page') === pageId) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    // optional: ensure snake canvas is in sync if needed, but loop runs globally.
  }

  navBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const page = btn.getAttribute('data-page');
      if(page === 'tic') switchPage('tic');
      else if(page === 'snake') switchPage('snake');
    });
  });

  // ----------------------------- TIC TAC TOE (PROFESSIONAL) ---------------------------------
  let ticBoardState = ['', '', '', '', '', '', '', '', ''];
  let ticCurrentPlayer = 'X';
  let ticGameActive = true;
  let ticWinCombo = null;
  let ticScoreX = 0, ticScoreO = 0;

  const ticBoardContainer = document.getElementById('ticBoard');
  const scoreXEl = document.getElementById('scoreX');
  const scoreOEl = document.getElementById('scoreO');
  const turnBadge = document.getElementById('turnBadge');
  const ticStatusDiv = document.getElementById('ticStatus');
  const newTicBtn = document.getElementById('newTicBtn');
  const resetTicScoresBtn = document.getElementById('resetTicScores');

  const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function updateTicUI() {
    scoreXEl.innerText = ticScoreX;
    scoreOEl.innerText = ticScoreO;
    if(ticGameActive) {
      turnBadge.innerText = ticCurrentPlayer;
      turnBadge.style.background = ticCurrentPlayer === 'X' ? '#4f6f8f' : '#6c4e3e';
    } else {
      turnBadge.innerText = ticCurrentPlayer;
    }
  }

  function setTicStatusMsg(msg, isError = false) {
    ticStatusDiv.innerHTML = msg;
    ticStatusDiv.style.background = isError ? '#832a2a80' : '#00000066';
    if(isError) setTimeout(() => { if(ticStatusDiv.innerHTML === msg) ticStatusDiv.style.background = '#00000066'; }, 900);
  }

  function clearTicHighlights() {
    document.querySelectorAll('#ticBoard .cell').forEach(c => c.classList.remove('win-highlight'));
  }

  function highlightTicWinning(combo) {
    if(!combo) return;
    const cells = document.querySelectorAll('#ticBoard .cell');
    combo.forEach(idx => { if(cells[idx]) cells[idx].classList.add('win-highlight'); });
  }

  function renderTicBoard() {
    ticBoardContainer.innerHTML = '';
    for(let i=0;i<9;i++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      if(ticBoardState[i] === 'X') { cell.classList.add('X'); cell.innerText = 'X'; }
      else if(ticBoardState[i] === 'O') { cell.classList.add('O'); cell.innerText = 'O'; }
      else cell.innerText = '';
      cell.dataset.index = i;
      if(!ticGameActive || ticBoardState[i] !== '') cell.classList.add('disabled-cell');
      cell.addEventListener('click', () => handleTicClick(i));
      ticBoardContainer.appendChild(cell);
    }
    if(ticWinCombo && !ticGameActive) highlightTicWinning(ticWinCombo);
    else clearTicHighlights();
  }

  function checkTicGameStatus() {
    for(let pattern of winPatterns) {
      const [a,b,c] = pattern;
      if(ticBoardState[a] && ticBoardState[a] === ticBoardState[b] && ticBoardState[a] === ticBoardState[c]) {
        const winner = ticBoardState[a];
        ticGameActive = false;
        ticWinCombo = pattern;
        if(winner === 'X') ticScoreX++;
        else ticScoreO++;
        updateTicUI();
        setTicStatusMsg(winner === 'X' ? '🎉 X wins the round! 🎉' : '🏆 O wins the round! 🏆');
        renderTicBoard();
        highlightTicWinning(ticWinCombo);
        return true;
      }
    }
    const isTie = ticBoardState.every(cell => cell !== '');
    if(isTie) {
      ticGameActive = false;
      ticWinCombo = null;
      setTicStatusMsg(`🤝 It's a tie! No points.`);
      renderTicBoard();
      return true;
    }
    return false;
  }

  function handleTicClick(idx) {
    if(!ticGameActive) { setTicStatusMsg(`Game over — start new round`, true); return; }
    if(ticBoardState[idx] !== '') { setTicStatusMsg(`Cell already taken`, true); return; }
    ticBoardState[idx] = ticCurrentPlayer;
    renderTicBoard();
    const ended = checkTicGameStatus();
    if(ended) { updateTicUI(); return; }
    ticCurrentPlayer = (ticCurrentPlayer === 'X') ? 'O' : 'X';
    updateTicUI();
    setTicStatusMsg(`⚡ ${ticCurrentPlayer}'s turn`);
    renderTicBoard();
  }

  function resetTicRound() {
    ticBoardState = ['', '', '', '', '', '', '', '', ''];
    ticCurrentPlayer = 'X';
    ticGameActive = true;
    ticWinCombo = null;
    renderTicBoard();
    updateTicUI();
    setTicStatusMsg(`✨ New round! X begins.`);
  }
  function fullTicReset() { ticScoreX = 0; ticScoreO = 0; updateTicUI(); resetTicRound(); }
  newTicBtn.addEventListener('click', resetTicRound);
  resetTicScoresBtn.addEventListener('click', fullTicReset);

  // ----------------------------- SNAKE GAME (enhanced robust) ----------------------------
  const canvas = document.getElementById('snakeCanvas');
  const ctx = canvas.getContext('2d');
  const snakeScoreSpan = document.getElementById('snakeScore');
  const highScoreSpan = document.getElementById('highScore');
  const snakeStatusDiv = document.getElementById('snakeStatus');
  const restartSnakeBtn = document.getElementById('restartSnakeBtn');
  const pauseSnakeBtn = document.getElementById('pauseSnakeBtn');

  let snake = [{x: 200, y: 200}];
  let food = {x: 100, y: 100};
  let dx = 20, dy = 0;
  let snakeScore = 0;
  let highSnakeScore = localStorage.getItem('snakeHighScoreArcade') ? parseInt(localStorage.getItem('snakeHighScoreArcade')) : 0;
  let snakeGameLoop = null;
  let snakeGameRunning = true;
  let isSnakePaused = false;
  let pendingDirection = null; // for smooth input
  const CELL_SIZE_SNAKE = 20;
  const GRID_SIZE_SNAKE = 20;
  let gameOverFlag = false;

  function updateSnakeUI() {
    snakeScoreSpan.innerText = snakeScore;
    highScoreSpan.innerText = highSnakeScore;
  }
  
  function saveHighScoreLocal() {
    if(snakeScore > highSnakeScore) {
      highSnakeScore = snakeScore;
      highScoreSpan.innerText = highSnakeScore;
      localStorage.setItem('snakeHighScoreArcade', highSnakeScore);
    }
  }
  
  function generateRandomFoodPos() {
    let maxAttempts = 2000;
    for(let attempt = 0; attempt < maxAttempts; attempt++) {
      let newPos = {x: Math.floor(Math.random() * GRID_SIZE_SNAKE) * CELL_SIZE_SNAKE, y: Math.floor(Math.random() * GRID_SIZE_SNAKE) * CELL_SIZE_SNAKE};
      let collision = false;
      for(let seg of snake) {
        if(seg.x === newPos.x && seg.y === newPos.y) { collision = true; break; }
      }
      if(!collision) return newPos;
    }
    // fallback: brute find empty cell
    for(let i = 0; i < GRID_SIZE_SNAKE; i++) {
      for(let j = 0; j < GRID_SIZE_SNAKE; j++) {
        let candidate = {x: i * CELL_SIZE_SNAKE, y: j * CELL_SIZE_SNAKE};
        let occupied = snake.some(seg => seg.x === candidate.x && seg.y === candidate.y);
        if(!occupied) return candidate;
      }
    }
    return {x: 40, y: 40}; // extremely rare case
  }

  function drawSnakeGame() {
    ctx.fillStyle = '#16262e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // subtle grid
    ctx.strokeStyle = '#2d4b5e';
    ctx.lineWidth = 0.5;
    for(let i=0;i<=GRID_SIZE_SNAKE;i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL_SIZE_SNAKE,0); ctx.lineTo(i*CELL_SIZE_SNAKE, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*CELL_SIZE_SNAKE); ctx.lineTo(canvas.width,i*CELL_SIZE_SNAKE); ctx.stroke();
    }
    // apple with leaf
    ctx.fillStyle = '#e84118';
    ctx.beginPath();
    ctx.arc(food.x + CELL_SIZE_SNAKE/2, food.y + CELL_SIZE_SNAKE/2, CELL_SIZE_SNAKE/2 - 2, 0, 2*Math.PI);
    ctx.fill();
    ctx.fillStyle = '#ffbc6e';
    ctx.beginPath(); 
    ctx.moveTo(food.x+12, food.y+5); 
    ctx.lineTo(food.x+15, food.y+12); 
    ctx.lineTo(food.x+8, food.y+12); 
    ctx.fill();
    // snake body gradient
    for(let i=0;i<snake.length;i++) {
      const s = snake[i];
      const grad = ctx.createLinearGradient(s.x, s.y, s.x+CELL_SIZE_SNAKE, s.y+CELL_SIZE_SNAKE);
      grad.addColorStop(0, '#3cac7a');
      grad.addColorStop(1, '#1f764c');
      ctx.fillStyle = grad;
      ctx.fillRect(s.x+1, s.y+1, CELL_SIZE_SNAKE-2, CELL_SIZE_SNAKE-2);
      if(i===0) { 
        ctx.fillStyle = '#FFD966'; 
        ctx.beginPath(); 
        ctx.arc(s.x+14, s.y+6, 3.5, 0, 2*Math.PI); 
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath(); 
        ctx.arc(s.x+12, s.y+5, 1.2, 0, 2*Math.PI); 
        ctx.fill();
      }
    }
  }

  function moveSnakeGame() {
    if(!snakeGameRunning || isSnakePaused || gameOverFlag) return;
    
    // apply pending direction safely
    if (pendingDirection) {
      const newDx = pendingDirection.dx;
      const newDy = pendingDirection.dy;
      // prevent 180-degree reversal
      if (!((newDx === -dx && newDy === -dy) || (newDy === -dy && newDx === -dx))) {
        dx = newDx;
        dy = newDy;
      }
      pendingDirection = null;
    }
    
    const head = {x: snake[0].x + dx, y: snake[0].y + dy};
    // wall collision
    if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) { snakeGameOver(); return; }
    // self collision (skip head temporarily)
    for(let i=0;i<snake.length;i++) {
      if(head.x === snake[i].x && head.y === snake[i].y) { snakeGameOver(); return; }
    }
    snake.unshift(head);
    if(head.x === food.x && head.y === food.y) {
      snakeScore++;
      updateSnakeUI();
      food = generateRandomFoodPos();
      saveHighScoreLocal();
    } else { 
      snake.pop(); 
    }
    drawSnakeGame();
  }

  function snakeGameOver() {
    if(gameOverFlag) return;
    gameOverFlag = true;
    snakeGameRunning = false;
    if(snakeGameLoop) clearInterval(snakeGameLoop);
    snakeGameLoop = null;
    snakeStatusDiv.innerHTML = `💀 GAME OVER! Score: ${snakeScore}. Press "New Game" 💀`;
    drawSnakeGame();
    ctx.fillStyle = '#000000aa';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font = 'bold 22px "Segoe UI"';
    ctx.fillStyle = '#ffde9c';
    ctx.fillText('GAME OVER', canvas.width/2-68, canvas.height/2);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#ddbb88';
    ctx.fillText('click New Game', canvas.width/2-55, canvas.height/2+35);
  }

  function resetSnake() {
    if(snakeGameLoop) clearInterval(snakeGameLoop);
    snake = [{x: 200, y: 200}];
    dx = 20; dy = 0;
    pendingDirection = null;
    snakeScore = 0;
    snakeGameRunning = true;
    isSnakePaused = false;
    gameOverFlag = false;
    updateSnakeUI();
    food = generateRandomFoodPos();
    // ensure not overlapping head
    while(food.x === 200 && food.y === 200) food = generateRandomFoodPos();
    drawSnakeGame();
    snakeGameLoop = setInterval(() => moveSnakeGame(), 130);
    snakeStatusDiv.innerHTML = `🐍 Game active! Arrow keys. Pause available.`;
    saveHighScoreLocal();
    highScoreSpan.innerText = highSnakeScore;
  }

  function toggleSnakePause() {
    if(gameOverFlag || !snakeGameRunning) { 
      snakeStatusDiv.innerHTML = `Game over, press New Game.`; 
      return; 
    }
    isSnakePaused = !isSnakePaused;
    if(isSnakePaused) {
      if(snakeGameLoop) clearInterval(snakeGameLoop);
      snakeGameLoop = null;
      snakeStatusDiv.innerHTML = `⏸️ PAUSED — Press Pause again to resume.`;
      drawSnakeGame();
      ctx.fillStyle = '#000000aa'; 
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.font = 'bold 20px "Segoe UI"'; 
      ctx.fillStyle = '#ffd58c'; 
      ctx.fillText('PAUSED', canvas.width/2-46, canvas.height/2);
    } else {
      snakeGameLoop = setInterval(() => moveSnakeGame(), 130);
      snakeStatusDiv.innerHTML = `▶️ Resumed! Use arrows.`;
      drawSnakeGame();
    }
  }

  window.addEventListener('keydown', (e) => {
    if(!document.getElementById('snakePage').classList.contains('active-page')) return;
    if(!snakeGameRunning || isSnakePaused || gameOverFlag) return;
    const key = e.key;
    let newDx = null, newDy = null;
    if(key === 'ArrowLeft' && dx === 0) { newDx = -CELL_SIZE_SNAKE; newDy = 0; }
    else if(key === 'ArrowUp' && dy === 0) { newDx = 0; newDy = -CELL_SIZE_SNAKE; }
    else if(key === 'ArrowRight' && dx === 0) { newDx = CELL_SIZE_SNAKE; newDy = 0; }
    else if(key === 'ArrowDown' && dy === 0) { newDx = 0; newDy = CELL_SIZE_SNAKE; }
    if(newDx !== null && newDy !== null) {
      e.preventDefault();
      pendingDirection = { dx: newDx, dy: newDy };
    }
  });

  restartSnakeBtn.addEventListener('click', () => resetSnake());
  pauseSnakeBtn.addEventListener('click', () => toggleSnakePause());

  // initialize both games
  function initTic() { renderTicBoard(); updateTicUI(); ticGameActive = true; ticWinCombo = null; setTicStatusMsg(`X's turn — click the board`); }
  initTic();
  // start snake fresh
  resetSnake();
</script>
</body>
</html>
